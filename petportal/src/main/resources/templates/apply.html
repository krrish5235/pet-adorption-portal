<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply to Adopt — PawFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand"><span>🐾</span> PawFind</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/pets">All Pets</a>
    <a href="/add">Add Pet</a>
    <a href="/admin/applications">Admin</a>
  </div>
</nav>

<div class="container">
  <a href="/pets" class="back-link">← Back to pets</a>
  <div class="form-card">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:2.5rem; margin-bottom:0.5rem;">🐾</div>
      <h2 style="font-size:1.5rem; font-weight:800;">Adoption application</h2>
      <p style="color:#6b7280; font-size:0.9rem; margin-top:4px;">Fill in your details and we'll get back to you soon.</p>
    </div>

    <form th:action="@{/apply}" th:object="${application}" method="post">
      <input type="hidden" th:field="*{petId}"/>

      <div class="form-row">
        <div class="form-group">
          <label>Your name *</label>
          <input th:field="*{applicantName}" required placeholder="John Doe"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input th:field="*{email}" type="email" required placeholder="john@example.com"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone *</label>
          <input th:field="*{phone}" required placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input th:field="*{address}" placeholder="Your address"/>
        </div>
      </div>

      <div class="form-group">
        <label>Why do you want to adopt this pet?</label>
        <textarea th:field="*{message}" placeholder="Tell us a little about yourself and why you'd be a great pet owner..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-success" style="flex:1; justify-content:center;">Submit application</button>
        <a href="/pets" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
