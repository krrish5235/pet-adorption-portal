<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Pet — PawFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand"><span>🐾</span> PawFind</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/pets">All Pets</a>
    <a href="/add" class="active">Add Pet</a>
    <a href="/admin/applications">Admin</a>
  </div>
</nav>

<div class="container">
  <a href="/pets" class="back-link">← Back to pets</a>
  <div class="form-card">
    <h2>Add a new pet</h2>

    <form th:action="@{/add}" th:object="${pet}" method="post">
      <div class="form-row">
        <div class="form-group">
          <label>Name *</label>
          <input th:field="*{name}" required placeholder="e.g. Buddy"/>
        </div>
        <div class="form-group">
          <label>Species *</label>
          <input th:field="*{species}" required placeholder="Dog, Cat, Rabbit…"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Breed</label>
          <input th:field="*{breed}" placeholder="e.g. Golden Retriever"/>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input th:field="*{age}" placeholder="e.g. 2 years, 3 months"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Gender</label>
          <select th:field="*{gender}">
            <option value="">Select…</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select th:field="*{status}">
            <option value="Available">Available</option>
            <option value="Pending">Pending</option>
            <option value="Adopted">Adopted</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input th:field="*{imageUrl}" placeholder="https://example.com/pet-photo.jpg"/>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea th:field="*{description}" placeholder="Tell people about this pet's personality, history, needs…"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center;">Save pet</button>
        <a href="/pets" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
