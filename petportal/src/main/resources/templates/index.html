<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawFind — Pet Adoption Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand"><span>🐾</span> PawFind</a>
  <div class="nav-links">
    <a href="/" class="active">Home</a>
    <a href="/pets">All Pets</a>
    <a href="/add">Add Pet</a>
    <a href="/admin/applications">Admin</a>
  </div>
</nav>

<div class="hero">
  <h1>Find your <span>perfect companion</span> 🐶🐱</h1>
  <p>Give a loving home to a pet waiting for you.</p>
</div>

<div class="container">
  <div class="page-header">
    <h2>Available pets</h2>
    <a href="/add" class="btn btn-primary">+ Add pet</a>
  </div>

  <div class="pet-grid" th:if="${available}">
    <div class="pet-card" th:each="pet : ${available}">
      <img th:src="${pet.imageUrl}" alt="pet photo" onerror="this.src='https://placehold.co/400x220/f3f4f6/9ca3af?text=No+Photo'"/>
      <div class="pet-card-body">
        <h3 th:text="${pet.name}">Name</h3>
        <p class="pet-card-meta" th:text="${pet.species} + ' · ' + ${pet.breed}">Species · Breed</p>
        <p class="pet-card-desc" th:text="${pet.description}">Description</p>
      </div>
      <div class="pet-card-footer">
        <span class="badge badge-available">Available</span>
        <a th:href="@{/pets/{id}(id=${pet.id})}" class="btn btn-primary btn-sm">View →</a>
      </div>
    </div>
  </div>

  <div class="empty" th:if="${#lists.isEmpty(available)}">
    <div class="empty-icon">🐾</div>
    <h3>No pets available right now</h3>
    <p>Check back soon or add a new pet!</p>
    <br/>
    <a href="/add" class="btn btn-primary">Add a pet</a>
  </div>
</div>

</body>
</html>
